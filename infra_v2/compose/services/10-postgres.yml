services:
  postgres:
    image: postgres:16
    container_name: woodops_v2_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data
    ports:
      - "15432:5432"
    volumes:
      - /srv/woodops-data-v2/postgres:/var/lib/postgresql/data
    networks:
      - woodops_v2_net
