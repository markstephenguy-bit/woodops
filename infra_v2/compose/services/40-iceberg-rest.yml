services:
  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    container_name: woodops_v2_iceberg_rest
    restart: unless-stopped
    depends_on:
      - postgres
      - minio
    environment:
      AWS_ACCESS_KEY_ID: ${WOODOPS_ADMIN_USER}
      AWS_SECRET_ACCESS_KEY: ${WOODOPS_ADMIN_PASSWORD}
      AWS_REGION: us-east-1
      CATALOG_CATALOG__IMPL: org.apache.iceberg.jdbc.JdbcCatalog
      CATALOG_URI: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      CATALOG_JDBC_USER: ${POSTGRES_USER}
      CATALOG_JDBC_PASSWORD: ${POSTGRES_PASSWORD}
      CATALOG_JDBC_SCHEMA: iceberg
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_WAREHOUSE: s3://warehouse/
      S3_ENDPOINT: http://minio:9000
      S3_PATH_STYLE_ACCESS: "true"
      REST_PORT: 8181
    ports:
      - "18181:8181"
    networks:
      - woodops_v2_net
