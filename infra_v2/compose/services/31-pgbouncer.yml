services:
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    container_name: woodops_v2_pgbouncer
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
    ports:
      - "16432:6432"
    volumes:
      - /opt/woodops/repo/infra_v2/services/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - /opt/woodops/repo/infra_v2/services/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    command: ["/usr/bin/pgbouncer", "/etc/pgbouncer/pgbouncer.ini"]
    networks:
      - woodops_v2_net
