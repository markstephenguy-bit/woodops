services:
  mongodb:
    image: mongo:8
    container_name: woodops_v2_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "37017:27017"
    volumes:
      - /srv/woodops-data-v2/mongodb:/data/db
      - /opt/woodops/repo/infra_v2/volumes/mongodb/configdb:/data/configdb
    networks:
      - woodops_v2_net
