services:
  nifi:
    image: apache/nifi:2.8.0
    container_name: woodops_v2_nifi
    restart: unless-stopped
    user: "1000:1000"
    environment:
      SINGLE_USER_CREDENTIALS_USERNAME: ${NIFI_SINGLE_USER}
      SINGLE_USER_CREDENTIALS_PASSWORD: ${NIFI_SINGLE_PASSWORD}
      NIFI_JVM_HEAP_INIT: 1g
      NIFI_JVM_HEAP_MAX: 2g
      NIFI_WEB_HTTPS_PORT: 8443
      NIFI_WEB_HTTPS_HOST: 0.0.0.0
      NIFI_WEB_PROXY_HOST: woodops-host:18443
    ports:
      - "18444:8443"
    volumes:
      - /srv/woodops-data-v2/nifi/content_repository:/opt/nifi/nifi-current/content_repository
      - /srv/woodops-data-v2/nifi/database_repository:/opt/nifi/nifi-current/database_repository
      - /srv/woodops-data-v2/nifi/flowfile_repository:/opt/nifi/nifi-current/flowfile_repository
      - /srv/woodops-data-v2/nifi/provenance_repository:/opt/nifi/nifi-current/provenance_repository
      - /srv/woodops-data-v2/nifi/state:/opt/nifi/nifi-current/state
      - /opt/woodops/repo/infra_v2/volumes/nifi/logs:/opt/nifi/nifi-current/logs
      - /opt/woodops/repo/infra_v2/volumes/nifi/conf:/opt/nifi/nifi-current/conf
      - /opt/woodops/repo/infra_v2/volumes/nifi/nar_extensions:/opt/nifi/nifi-current/nar_extensions
      - /opt/woodops/repo/infra_v2/volumes/nifi/python_extensions:/opt/nifi/nifi-current/python_extensions
    networks:
      - woodops_v2_net
