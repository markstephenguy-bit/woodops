services:
  nifi:
    image: ${NIFI_IMAGE}
    container_name: woodops_nifi
    restart: unless-stopped
    ports:
      - "${NIFI_PORT}:8443"
    environment:
      NIFI_WEB_HTTPS_PORT: "8443"
      NIFI_WEB_HTTPS_HOST: "0.0.0.0"
      NIFI_WEB_PROXY_HOST: "${NIFI_HOST}:${NIFI_PORT}"
      SINGLE_USER_CREDENTIALS_USERNAME: "${NIFI_USERNAME}"
      SINGLE_USER_CREDENTIALS_PASSWORD: "${NIFI_PASSWORD}"
      NIFI_JVM_HEAP_INIT: "${NIFI_JVM_HEAP_INIT}"
      NIFI_JVM_HEAP_MAX: "${NIFI_JVM_HEAP_MAX}"
    volumes:
      - /srv/woodops-data/nifi/content_repository:/opt/nifi/nifi-current/content_repository
      - /srv/woodops-data/nifi/database_repository:/opt/nifi/nifi-current/database_repository
      - /srv/woodops-data/nifi/flowfile_repository:/opt/nifi/nifi-current/flowfile_repository
      - /srv/woodops-data/nifi/provenance_repository:/opt/nifi/nifi-current/provenance_repository
      - /srv/woodops-data/nifi/state:/opt/nifi/nifi-current/state
    networks:
      - woodops_net
  tika:
    image: ${TIKA_IMAGE}
    container_name: woodops_tika
    restart: unless-stopped
    networks:
      - woodops_net
    ports:
      - "${TIKA_PORT}:9998"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9998/tika >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
  postgres:
    image: postgres:16
    container_name: woodops_postgres
    restart: unless-stopped
    networks:
      - woodops_net
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - /srv/woodops-data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: woodops_redis
    restart: unless-stopped
    networks:
      - woodops_net
    command: ["redis-server", "--appendonly", "${REDIS_APPENDONLY:?REDIS_APPENDONLY is required}"]
    volumes:
      - /srv/woodops-data/redis:/data
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: woodops_minio
    restart: unless-stopped
    networks:
      - woodops_net
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    command: server /data --console-address ":${MINIO_CONSOLE_PORT:?MINIO_CONSOLE_PORT is required}"
    volumes:
      - /srv/woodops-data/minio:/data
    ports:
      - "${MINIO_API_PORT:?MINIO_API_PORT is required}:9000"
      - "${MINIO_CONSOLE_PORT:?MINIO_CONSOLE_PORT is required}:9001"

  mongodb:
    image: mongo:8
    container_name: woodops_mongodb
    restart: unless-stopped
    networks:
      - woodops_net
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?MONGO_INITDB_ROOT_USERNAME is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is required}
    volumes:
      - /srv/woodops-data/mongodb:/data/db
    ports:
      - "${MONGO_PORT:?MONGO_PORT is required}:27017"

  clickhouse:
    image: clickhouse/clickhouse-server:24.12
    container_name: woodops_clickhouse
    restart: unless-stopped
    networks:
      - woodops_net
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:?CLICKHOUSE_DB is required}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:?CLICKHOUSE_USER is required}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD is required}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - /srv/woodops-data/clickhouse:/var/lib/clickhouse
      - /srv/woodops-data/clickhouse-logs:/var/log/clickhouse-server
    ports:
      - "${CLICKHOUSE_HTTP_PORT:?CLICKHOUSE_HTTP_PORT is required}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:?CLICKHOUSE_NATIVE_PORT is required}:9000"

  opensearch:
    image: opensearchproject/opensearch:latest
    container_name: woodops_opensearch
    restart: unless-stopped
    networks:
      - woodops_net
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      OPENSEARCH_JAVA_OPTS: ${OPENSEARCH_JAVA_OPTS:?OPENSEARCH_JAVA_OPTS is required}
      bootstrap.memory_lock: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - /srv/woodops-data/opensearch:/usr/share/opensearch/data
    ports:
      - "${OPENSEARCH_HTTP_PORT:?OPENSEARCH_HTTP_PORT is required}:9200"
      - "${OPENSEARCH_METRICS_PORT:?OPENSEARCH_METRICS_PORT is required}:9600"

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3.5.0
    container_name: woodops_opensearch_dashboards
    restart: unless-stopped
    networks:
      - woodops_net
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "${OPENSEARCH_DASHBOARDS_PORT:?OPENSEARCH_DASHBOARDS_PORT is required}:5601"

  pgadmin:
    image: ${PGADMIN_IMAGE}
    container_name: woodops_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - /srv/woodops-data/pgadmin:/var/lib/pgadmin
    networks:
      - woodops_net

