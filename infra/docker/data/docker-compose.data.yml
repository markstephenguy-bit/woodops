services:
  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    container_name: woodops_iceberg_rest
    restart: unless-stopped
    networks:
      - woodops_net
    ports:
      - "${ICEBERG_REST_PORT}:8181"
    environment:
      - CATALOG_WAREHOUSE=s3://warehouse/
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - S3_ENDPOINT=http://minio:9000
      - S3_PATH_STYLE_ACCESS=true
      - CATALOG_CATALOG__IMPL=org.apache.iceberg.jdbc.JdbcCatalog
      - CATALOG_URI=jdbc:postgresql://postgres:5432/woodops
      - CATALOG_JDBC_USER=${POSTGRES_USER}
      - CATALOG_JDBC_PASSWORD=${POSTGRES_PASSWORD}
      - CATALOG_JDBC_SCHEMA=iceberg
    depends_on:
      - minio
      - postgres

  trino:
    image: trinodb/trino:477
    container_name: woodops_trino
    restart: unless-stopped
    networks:
      - woodops_net
    ports:
      - "${TRINO_PORT}:8080"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - /opt/woodops/repo/infra/docker/data/trino/catalog:/etc/trino/catalog:ro
      - /srv/woodops-data/trino:/var/trino/data
    depends_on:
      - iceberg-rest
      - minio
      - postgres

networks:
  woodops_net:
    external: true
