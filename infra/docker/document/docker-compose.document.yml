services:
  ocr:
    image: hertzg/tesseract-server:latest
    container_name: woodops_ocr
    restart: unless-stopped
    networks:
      - woodops_net
    ports:
      - "${OCR_PORT}:8884"
    environment:
      NODE_ENV: production
      PORT: "8884"
    tmpfs:
      - /tmp:size=512m
    volumes:
      - /srv/woodops-data/ocr:/work
    healthcheck:
      test: ["CMD-SHELL", "tesseract --version >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 12

networks:
  woodops_net:
    external: true
