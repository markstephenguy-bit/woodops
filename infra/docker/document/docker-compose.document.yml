services:
  ocr:
    image: hertzg/tesseract-server:latest
    container_name: woodops_ocr
    restart: unless-stopped
    networks:
      - woodops_net
    ports:
      - "${OCR_PORT}:8884"
    environment:
      NODE_ENV: production
      PORT: "8884"
    tmpfs:
      - /tmp:size=512m
    volumes:
      - /srv/woodops-data/ocr:/work
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8884/.well-known/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 20s
      timeout: 5s
      retries: 12

networks:
  woodops_net:
    external: true
